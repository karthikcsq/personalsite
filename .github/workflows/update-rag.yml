name: Update RAG Embeddings

on:
  push:
    branches: [main]
    paths:
      - 'personalsite/src/data/projects.json'
      - 'python-rag/**'
      - 'personalsite/blog/posts/**'

  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  update-pinecone:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: python-rag
        run: uv sync

      - name: Upload to Pinecone (hybrid: dense + sparse)
        working-directory: python-rag
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME: ${{ secrets.PINECONE_INDEX_NAME }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run python create-pinecone.py --reset --yes

      - name: Commit updated BM25 model
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add personalsite/src/data/bm25-model.json
          git diff --staged --quiet || git commit -m "Update BM25 model from RAG pipeline"
          git push
